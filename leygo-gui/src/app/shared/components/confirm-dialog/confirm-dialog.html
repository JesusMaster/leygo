<div *ngIf="showModal" class="confirm-overlay" (click)="onClose()">
  <div class="confirm-dialog" (click)="$event.stopPropagation()">
    <div class="confirm-header">
      <div class="confirm-icon bg-red-glass">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <h3 class="confirm-title">{{ title || 'Confirmar Acción' }}</h3>
    </div>
    
    <div class="confirm-body">
      <p>{{ message }}</p>
    </div>
    
    <div class="confirm-actions">
      <button type="button" class="btn btn-secondary" (click)="onClose()">Cancelar</button>
      <button type="button" class="btn btn-danger" (click)="onConfirm()">Aceptar</button>
    </div>
  </div>
</div>

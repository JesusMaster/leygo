<div class="layout-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo-section">
      <div class="logo-icon">
        <svg version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
          x="0px" y="0px" viewBox="0 0 226.772 226.772" style="enable-background:new 0 0 226.772 226.772;"
          xml:space="preserve">
          <circle style="fill:none;stroke:var(--text-main);stroke-width:8;stroke-miterlimit:10;" cx="50.827" cy="49.444"
            r="24.941" />
          <circle cx="50.386" cy="175.193" r="27.5" style="fill:var(--text-main);"/>
          <line style="fill:none;stroke:var(--text-main);stroke-width:10;stroke-miterlimit:10;" x1="77.886" y1="175.193"
            x2="151.193" y2="175.193" />
          <g>
            <g>

              <line style="fill:none;stroke:var(--accent-primary);stroke-width:10;stroke-miterlimit:10;" x1="170.254" y1="161.6"
                x2="167.425" y2="158.772" />

              <line style="fill:none;stroke:var(--accent-primary);stroke-width:10;stroke-miterlimit:10;stroke-dasharray:8.458,8.458;"
                x1="161.444" y1="152.791" x2="80.705" y2="72.051" />
              <line style="fill:none;stroke:var(--accent-primary);stroke-width:10;stroke-miterlimit:10;" x1="77.714" y1="69.061"
                x2="74.886" y2="66.232" />
            </g>
          </g>
          <circle style="fill:var(--accent-primary);" cx="178.693" cy="175.193" r="27.5" />
          <line style="fill:none;stroke:var(--text-main);stroke-width:10;stroke-miterlimit:10;" x1="50.386" y1="147.693"
            x2="50.386" y2="74.386" />
        </svg>
      </div>

      <h1 class="logo-text">leygo</h1>
    </div>

    <nav class="nav-menu">
      <a routerLink="/chat" routerLinkActive="active" class="nav-item">
        <span class="icon"><i class="ph ph-chat-circle-dots"></i></span>
        <span class="label">Chat Assistant</span>
      </a>
      <a routerLink="/tasks" routerLinkActive="active" class="nav-item">
        <span class="icon"><i class="ph ph-calendar-blank"></i></span>
        <span class="label">Scheduled Tasks</span>
      </a>
      <a routerLink="/webhooks" routerLinkActive="active" class="nav-item">
        <span class="icon"><i class="ph ph-share-network"></i></span>
        <span class="label">Smart Webhooks</span>
      </a>
      <a routerLink="/usage" routerLinkActive="active" class="nav-item">
        <span class="icon"><i class="ph ph-chart-bar"></i></span>
        <span class="label">Token Usage</span>
      </a>
      <a routerLink="/agents" routerLinkActive="active" class="nav-item">
        <span class="icon"><i class="ph ph-robot"></i></span>
        <span class="label">Agents Library</span>
      </a>
      <a routerLink="/mcp-settings" routerLinkActive="active" class="nav-item">
        <span class="icon"><i class="ph ph-plug"></i></span>
        <span class="label">Conectores MCP</span>
      </a>
      <a routerLink="/config" routerLinkActive="active" class="nav-item">
        <span class="icon"><i class="ph ph-gear"></i></span>
        <span class="label">Configuration</span>
      </a>
    </nav>

    <!-- <div class="favorites-section">
      <p class="section-title">FAVORITES</p>
      <div class="favorite-item">
        <span class="dot green"></span>
        <span class="label">Data Analysis Pro</span>
      </div>
      <div class="favorite-item">
        <span class="dot orange"></span>
        <span class="label">Creative Writing</span>
      </div>
    </div> -->

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="avatar-container">
          <img [src]="'https://ui-avatars.com/api/?name=' + userName + '&background=0ea5e9&color=fff&bold=true'"
            alt="User Avatar">
        </div>
        <div class="user-details">
          <span class="user-name">{{ userName }}</span>
          <button class="logout-mini-btn" (click)="logout()" title="Cerrar sesión de forma segura">
            <i class="ph ph-sign-out"></i> Cerrar Sesión
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content-area">
    <header class="main-header">
      <div class="project-info">
        <h2 class="project-name">Project</h2>
        <div class="status">
          <span class="dot green"></span>
          Agent Online
        </div>
      </div>
      <div class="header-actions">
        <div class="theme-switch-wrapper">
          <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" [checked]="isDarkMode" (change)="toggleTheme()" />
            <div class="slider round">
              <i class="ph ph-sun sun-icon"></i>
              <i class="ph ph-moon moon-icon"></i>
            </div>
          </label>
        </div>
      </div>
    </header>
    <div class="view-container">
      <router-outlet></router-outlet>
    </div>
  </main>

  <app-toast></app-toast>
  <app-confirm-dialog></app-confirm-dialog>
</div>
